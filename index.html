<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surf Tour - Combined Standings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .highlight { background-color: #fefce8; }
    th, td { padding: 14px 16px; }
    .event-col { background-color: #f8fafc; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-6xl mx-auto px-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <i class="fa-solid fa-trophy text-4xl text-yellow-500"></i>
        <div>
          <h1 class="text-3xl font-bold">Season Standings</h1>
          <p class="text-gray-600">Combined Men's + Women's League • 2 Events Completed</p>
        </div>
      </div>
      <div class="text-sm text-gray-500 flex items-center gap-2">
        <i class="fa-solid fa-users"></i>
        Members (14)
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-100">
          <tr>
            <th class="text-left font-medium text-gray-700">Member</th>
            <th class="text-right font-medium text-gray-700 event-col">Bells Beach</th>
            <th class="text-right font-medium text-gray-700 event-col">Margaret River</th>
            <th class="text-right font-medium text-orange-600">Men Total</th>
            <th class="text-right font-medium text-purple-600">Women Total</th>
            <th class="text-right bg-yellow-100 font-bold text-yellow-600">COMBINED</th>
            <th class="text-right bg-emerald-100 font-bold text-emerald-600">Drop Worst 2</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body" class="divide-y"></tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Last updated: <span id="last-updated"></span> • Edit the scores in the code after each new event
    </p>
  </div>

  <script>
    // ==================== EASY TO EDIT DATA SECTION ====================
    // Add new events here as the season progresses (format: { name: "Event Name", men: number, women: number })
    const members = [
      {
        name: "@lanelotizard",
        avatar: "🦎",
        events: [
          { name: "Bells Beach", men: 434, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }   // Update these when results come in
        ]
      },
      {
        name: "@newpointlocal",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 430, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@san_lo_slurpee (You)",
        avatar: "🏄‍♂️",
        events: [
          { name: "Bells Beach", men: 430, women: 504 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@BananaPancakes",
        avatar: "🥞",
        events: [
          { name: "Bells Beach", men: 402, women: 538 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@leftsonly",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 390, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@arizonasurfchampion",
        avatar: "🏜️",
        events: [
          { name: "Bells Beach", men: 390, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@BethanyCurvBarrelDodger",
        avatar: "🕶️",
        events: [
          { name: "Bells Beach", men: 372, women: 498 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@mrburns",
        avatar: "🔥",
        events: [
          { name: "Bells Beach", men: 362, women: 538 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@foillord_831",
        avatar: "🏄",
        events: [
          { name: "Bells Beach", men: 332, women: 558 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@Bi-stanceceual",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 332, women: 408 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@surfergirl69",
        avatar: "🏄‍♀️",
        events: [
          { name: "Bells Beach", men: 309, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@cocohomygod",
        avatar: "🌴",
        events: [
          { name: "Bells Beach", men: 264, women: 630 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@wslcansuckmynuts",
        avatar: "🏄",
        events: [
          { name: "Bells Beach", men: 241, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@bonghitbogger",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 241, women: 502 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      }
    ];

    // ==================== CALCULATIONS (no need to edit) ====================
    members.forEach(member => {
      member.menTotal = member.events.reduce((sum, ev) => sum + ev.men, 0);
      member.womenTotal = member.events.reduce((sum, ev) => sum + ev.women, 0);
      member.combined = member.menTotal + member.womenTotal;

      // Drop Worst 2: calculate per-event total (men + women), drop the two lowest
      const eventTotals = member.events.map(ev => ev.men + ev.women);
      if (eventTotals.length > 2) {
        const sorted = [...eventTotals].sort((a, b) => a - b);
        member.dropWorst2 = member.combined - sorted[0] - sorted[1];
      } else {
        member.dropWorst2 = member.combined;
      }
    });

    // Sort by Drop Worst 2 (highest first)
    members.sort((a, b) => b.dropWorst2 - a.dropWorst2);

    // Render the table
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';

    members.forEach((m, index) => {
      const isYou = m.name.toLowerCase().includes('slurpee');
      const row = document.createElement('tr');
      if (isYou) row.className = 'highlight';

      let eventCells = '';
      m.events.forEach(ev => {
        eventCells += `<td class="text-right font-mono event-col">${ev.men + ev.women}</td>`;
      });

      row.innerHTML = `
        <td class="flex items-center gap-3 font-medium">
          <span class="text-2xl">${m.avatar}</span>
          ${m.name}
        </td>
        ${eventCells}
        <td class="text-right font-mono text-orange-600">${m.menTotal}</td>
        <td class="text-right font-mono text-purple-600">${m.womenTotal}</td>
        <td class="text-right font-bold text-2xl text-yellow-600 bg-yellow-100">${m.combined}</td>
        <td class="text-right font-bold text-2xl text-emerald-600 bg-emerald-100">${m.dropWorst2}</td>
      `;
      tbody.appendChild(row);
    });

    // Last updated
    document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  </script>
</body>
</html>
