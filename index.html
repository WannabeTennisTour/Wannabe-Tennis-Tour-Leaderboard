<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wannabe Tennis Tour - Combined Standings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }

    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    .table-container::-webkit-scrollbar {
      height: 6px;
    }

    .table-container::-webkit-scrollbar-thumb {
      background-color: #d1d5db;
      border-radius: 20px;
    }

    table {
      border-collapse: collapse;
    }

    th, td {
      border-right: 1px solid #e5e7eb;
    }

    th:last-child, td:last-child {
      border-right: none;
    }

    thead th {
      border-bottom: 2px solid #d1d5db;
    }

    .rank-cell {
      min-width: 60px;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .event-cell {
      min-width: 110px;
      padding: 10px 8px;
      text-align: center;
      white-space: nowrap;
    }

    .event-total {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1f2937;
    }

    .event-detail {
      font-size: 0.72rem;
      line-height: 1.1;
      color: #6b7280;
      margin-top: 3px;
    }

    .combined-cell {
      min-width: 110px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #ca8a04;
    }

    tr {
      transition: all 0.2s ease;
    }

    tr.highlighted {
      background-color: #fefce8 !important;
      box-shadow: 0 0 0 3px #eab308 inset;
      position: relative;
    }

    @media (max-width: 640px) {
      .rank-cell { min-width: 50px; font-size: 1rem; }
      .event-cell { min-width: 96px; padding: 8px 6px; }
      .event-total { font-size: 1.05rem; }
      .combined-cell { font-size: 1.15rem; min-width: 100px; }
      th, td { padding: 10px 6px; font-size: 0.9rem; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-6">
  <div class="max-w-5xl mx-auto px-4 sm:px-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-trophy text-3xl text-yellow-500"></i>
        <div>
          <h1 class="text-2xl font-bold">Wannabe Tennis Tour Leaderboard</h1>
          <p class="text-gray-600 text-sm">Combined Men's + Women's</p>
        </div>
      </div>
      <div class="text-sm text-gray-500 flex items-center gap-2">
        <i class="fa-solid fa-users"></i>
        <span>15 Members</span>
      </div>
    </div>

    <!-- Scrollable Table -->
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <div class="table-container">
        <table class="w-full">
          <thead class="bg-gray-100 sticky top-0 z-20">
            <tr>
              <th class="text-center py-4 font-medium text-gray-700">Rank</th>
              <th class="text-left pl-5 py-4 font-medium text-gray-700">Member</th>
              <th class="text-right pr-4 py-4 font-bold bg-yellow-100 text-yellow-600">COMBINED</th>
              <th class="text-center py-4 font-medium text-gray-700">Bells Beach</th>
              <!-- Margaret River column (commented out for now) -->
              <!-- <th class="text-center py-4 font-medium text-gray-700">Margaret River</th> -->
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="divide-y text-sm"></tbody>
        </table>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Last updated: <span id="last-updated"></span> • Tap any row to highlight
    </p>
  </div>

  <script>
    // ==================== EDIT THIS DATA AFTER EACH EVENT ====================
    const members = [
      { name: "@lanelotizard",        avatar: "🦎", events: [{ name: "Bells Beach", men: 434, women: 458 }] },
      { name: "@newpointlocal",       avatar: "🏋️‍♀️", events: [{ name: "Bells Beach", men: 430, women: 0 }] },
      { name: "@san_lo_slurpee",      avatar: "🥤", events: [{ name: "Bells Beach", men: 430, women: 504 }] },
      { name: "@BananaPancakes",      avatar: "🥞", events: [{ name: "Bells Beach", men: 402, women: 538 }] },
      { name: "@leftsonly",           avatar: "⬅️", events: [{ name: "Bells Beach", men: 390, women: 458 }] },
      { name: "@arizonasurfchampion", avatar: "🏜️", events: [{ name: "Bells Beach", men: 390, women: 0 }] },
      { name: "@BethanyCurvBarrelDodger", avatar: "🕶️", events: [{ name: "Bells Beach", men: 372, women: 498 }] },
      { name: "@mrburns",             avatar: "💰", events: [{ name: "Bells Beach", men: 362, women: 538 }] },
      { name: "@foillord_831",        avatar: "⛵", events: [{ name: "Bells Beach", men: 332, women: 558 }] },
      { name: "@Bi-stanceceual",      avatar: "🏳️‍🌈", events: [{ name: "Bells Beach", men: 332, women: 408 }] },
      { name: "@surfergirl69",        avatar: "♋", events: [{ name: "Bells Beach", men: 309, women: 458 }] },
      { name: "@cocohomygod",         avatar: "👙", events: [{ name: "Bells Beach", men: 264, women: 630 }] },
      { name: "@wslcansuckmynuts",    avatar: "🥜", events: [{ name: "Bells Beach", men: 241, women: 0 }] },
      { name: "@bonghitbogger",       avatar: "🌿", events: [{ name: "Bells Beach", men: 241, women: 502 }] },
      { name: "@ridingprivates",      avatar: "🍆", events: [{ name: "Bells Beach", men: 0, women: 0 }] }
    ];

    // Calculations + Ranking
    members.forEach(member => {
      member.menTotal = member.events.reduce((sum, ev) => sum + ev.men, 0);
      member.womenTotal = member.events.reduce((sum, ev) => sum + ev.women, 0);
      member.combined = member.menTotal + member.womenTotal;
    });

    // Sort by Combined (highest first)
    members.sort((a, b) => b.combined - a.combined);

    // Render table
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';

    members.forEach((member, index) => {
      const rank = index + 1;
      let rankHTML = '';

      if (rank === 1) rankHTML = '🥇';
      else if (rank === 2) rankHTML = '🥈';
      else if (rank === 3) rankHTML = '🥉';
      else if (rank === members.length) rankHTML = '🗑️';
      else rankHTML = rank;

      let eventCells = '';
      member.events.forEach(ev => {
        const eventTotal = ev.men + ev.women;
        eventCells += `
          <td class="event-cell">
            <div class="event-total">${eventTotal}</div>
            <div class="event-detail">
              M:${ev.men}<br>W:${ev.women}
            </div>
          </td>
        `;
      });

      const row = document.createElement('tr');
      row.className = "cursor-pointer hover:bg-yellow-50";
      row.innerHTML = `
        <td class="rank-cell py-4 border-r border-gray-200">${rankHTML}</td>
        <td class="pl-5 py-4 font-medium flex items-center gap-3 whitespace-nowrap border-r border-gray-200">
          <span class="text-2xl flex-shrink-0">${member.avatar}</span>
          <span>${member.name}</span>
        </td>
        <td class="combined-cell text-right pr-6 py-4 border-r border-gray-200">
          ${member.combined}
        </td>
        ${eventCells}
      `;

      // Click to highlight entire row
      row.addEventListener('click', () => {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('highlighted'));
        row.classList.add('highlighted');
      });

      tbody.appendChild(row);
    });

    // Last updated
    document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', {
      month: 'short',
      day: 'numeric',
      year: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  </script>
</body>
</html>
