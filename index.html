<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surf Tour - Combined Standings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }

    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    .table-container::-webkit-scrollbar {
      height: 6px;
    }

    .table-container::-webkit-scrollbar-thumb {
      background-color: #d1d5db;
      border-radius: 20px;
    }

    .event-cell {
      min-width: 100px;
      padding: 10px 8px;
      text-align: center;
      white-space: nowrap;
    }

    .event-total {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1f2937;
    }

    .event-detail {
      font-size: 0.72rem;
      line-height: 1.1;
      color: #6b7280;
      margin-top: 3px;
    }

    .member-col {
      min-width: 180px;
      position: sticky;
      left: 0;
      background: white;
      z-index: 10;
    }

    @media (max-width: 640px) {
      .member-col { min-width: 160px; }
      .event-cell { min-width: 92px; padding: 8px 6px; }
      .event-total { font-size: 1.05rem; }
      th, td { padding: 10px 6px; font-size: 0.9rem; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-6">
  <div class="max-w-5xl mx-auto px-4 sm:px-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-trophy text-3xl text-yellow-500"></i>
        <div>
          <h1 class="text-2xl font-bold">Season Standings</h1>
          <p class="text-gray-600 text-sm">Combined Men's + Women's League</p>
        </div>
      </div>
      <div class="text-sm text-gray-500 flex items-center gap-2">
        <i class="fa-solid fa-users"></i>
        <span>14 Members</span>
      </div>
    </div>

    <!-- Scrollable Table -->
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <div class="table-container">
        <table class="w-full border-collapse">
          <thead class="bg-gray-100 sticky top-0 z-20">
            <tr>
              <th class="text-left pl-5 py-4 font-medium text-gray-700 member-col">Member</th>
              <th class="text-center py-4 font-medium text-gray-700">Bells Beach</th>
              <th class="text-center py-4 font-medium text-gray-700">Margaret River</th>
              <th class="text-right pr-6 py-4 font-bold bg-yellow-100 text-yellow-600">COMBINED</th>
              <th class="text-right pr-6 py-4 font-bold bg-emerald-100 text-emerald-600">Drop Worst 2</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="divide-y text-sm"></tbody>
        </table>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Last updated: <span id="last-updated"></span> • Update scores in the code after each event
    </p>
  </div>

  <script>
    // ==================== EDIT THIS DATA AFTER EACH EVENT ====================
    const members = [
      {
        name: "@lanelotizard",
        avatar: "🦎",
        events: [
          { name: "Bells Beach", men: 434, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@newpointlocal",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 430, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@san_lo_slurpee",
        avatar: "🏄‍♂️",
        events: [
          { name: "Bells Beach", men: 430, women: 504 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@BananaPancakes",
        avatar: "🥞",
        events: [
          { name: "Bells Beach", men: 402, women: 538 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@leftsonly",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 390, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@arizonasurfchampion",
        avatar: "🏜️",
        events: [
          { name: "Bells Beach", men: 390, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@BethanyCurvBarrelDodger",
        avatar: "🕶️",
        events: [
          { name: "Bells Beach", men: 372, women: 498 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@mrburns",
        avatar: "🔥",
        events: [
          { name: "Bells Beach", men: 362, women: 538 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@foillord_831",
        avatar: "🏄",
        events: [
          { name: "Bells Beach", men: 332, women: 558 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@Bi-stanceceual",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 332, women: 408 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@surfergirl69",
        avatar: "🏄‍♀️",
        events: [
          { name: "Bells Beach", men: 309, women: 458 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@cocohomygod",
        avatar: "🌴",
        events: [
          { name: "Bells Beach", men: 264, women: 630 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@wslcansuckmynuts",
        avatar: "🏄",
        events: [
          { name: "Bells Beach", men: 241, women: 0 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      },
      {
        name: "@bonghitbogger",
        avatar: "🌊",
        events: [
          { name: "Bells Beach", men: 241, women: 502 },
          { name: "Margaret River", men: 0, women: 0 }
        ]
      }
    ];

    // Calculations
    members.forEach(member => {
      member.menTotal = member.events.reduce((sum, ev) => sum + ev.men, 0);
      member.womenTotal = member.events.reduce((sum, ev) => sum + ev.women, 0);
      member.combined = member.menTotal + member.womenTotal;

      const eventTotals = member.events.map(ev => ev.men + ev.women);
      if (eventTotals.length > 2) {
        const sorted = [...eventTotals].sort((a, b) => a - b);
        member.dropWorst2 = member.combined - sorted[0] - sorted[1];
      } else {
        member.dropWorst2 = member.combined;
      }
    });

    // Sort by Drop Worst 2
    members.sort((a, b) => b.dropWorst2 - a.dropWorst2);

    // Render table
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';

    members.forEach(member => {
      let eventCells = '';
      
      member.events.forEach(ev => {
        const eventTotal = ev.men + ev.women;
        eventCells += `
          <td class="event-cell border-r border-gray-100 last:border-r-0">
            <div class="event-total">${eventTotal}</div>
            <div class="event-detail">
              M:${ev.men}<br>W:${ev.women}
            </div>
          </td>
        `;
      });

      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="pl-5 py-4 font-medium flex items-center gap-3 member-col">
          <span class="text-2xl flex-shrink-0">${member.avatar}</span>
          <span class="truncate">${member.name}</span>
        </td>
        ${eventCells}
        <td class="text-right pr-6 py-4 font-bold text-2xl text-yellow-600 bg-yellow-50">${member.combined}</td>
        <td class="text-right pr-6 py-4 font-bold text-2xl text-emerald-600 bg-emerald-50">${member.dropWorst2}</td>
      `;
      tbody.appendChild(row);
    });

    // Last updated
    document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', {
      month: 'short', 
      day: 'numeric', 
      year: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  </script>
</body>
</html>
