<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surf Tour - Combined Standings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .highlight { background-color: #fefce8; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-trophy text-3xl text-yellow-500"></i>
        <div>
          <h1 class="text-2xl font-bold">Season Standings</h1>
          <p class="text-gray-500">1 Completed Event — Combined Men's + Women's League</p>
        </div>
      </div>
      <div class="text-sm text-gray-500 flex items-center gap-2">
        <i class="fa-solid fa-users"></i>
        Members (14)
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-6 py-4 text-left font-medium text-gray-700">Member</th>
            <th class="px-6 py-4 text-right font-medium text-gray-700">Men's Total</th>
            <th class="px-6 py-4 text-right font-medium text-gray-700">Women's Total</th>
            <th class="px-6 py-4 text-right font-medium text-gray-700 bg-yellow-100">COMBINED</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body" class="divide-y text-sm"></tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Last updated: <span id="last-updated"></span> • Updated manually after each event
    </p>
  </div>

  <script>
    // ==================== EDIT THIS DATA ====================
    const members = [
      { rank: 1, name: "@lanelotizard", avatar: "🦎", men: 434, women: 0, combined: 434 },
      { rank: 2, name: "@newpointlocal", avatar: "🌊", men: 430, women: 0, combined: 430 },
      { rank: 3, name: "@san_lo_slurpee (You)", avatar: "🏄‍♂️", men: 430, women: 0, combined: 430 },
      { rank: 4, name: "@BananaPancakes", avatar: "🥞", men: 402, women: 0, combined: 402 },
      { rank: 5, name: "@leftsonly", avatar: "⬅️", men: 390, women: 0, combined: 390 },
      { rank: 6, name: "@arizonasurfchampion", avatar: "🏜️", men: 390, women: 0, combined: 390 },
      { rank: 7, name: "@BethanyCurvBarrelDodger", avatar: "🕶️", men: 372, women: 0, combined: 372 },
      { rank: 8, name: "@mrburns", avatar: "🔥", men: 362, women: 0, combined: 362 },
      { rank: 9, name: "@foillord_831", avatar: "🏄", men: 332, women: 0, combined: 332 },
      { rank: 10, name: "@Bi-stanceual", avatar: "⬅️", men: 390, women: 0, combined: 390 },
      { rank: 11, name: "@surfergirl69", avatar: "🏜️", men: 390, women: 0, combined: 390 },
      { rank: 12, name: "@cocohomygod", avatar: "🕶️", men: 372, women: 0, combined: 372 },
      { rank: 13, name: "@wslcansuckmynuts", avatar: "🔥", men: 362, women: 0, combined: 362 },
      { rank: 14, name: "@bonghitbogger", avatar: "🏄", men: 332, women: 0, combined: 332 },
    ];

    // Sort by combined score (highest first) and re-rank
    members.sort((a, b) => b.combined - a.combined);
    members.forEach((m, i) => m.rank = i + 1);

    // Render table
    const tbody = document.getElementById('leaderboard-body');
    members.forEach(m => {
      const row = document.createElement('tr');
      row.className = m.name.includes('You') ? 'highlight' : '';
      row.innerHTML = `
        <td class="px-6 py-4 flex items-center gap-3">
          <span class="text-2xl">${m.avatar}</span>
          <div>
            <span class="font-medium">${m.name}</span>
          </div>
        </td>
        <td class="px-6 py-4 text-right font-mono text-orange-600">${m.men}</td>
        <td class="px-6 py-4 text-right font-mono text-purple-600">${m.women}</td>
        <td class="px-6 py-4 text-right font-bold text-2xl text-yellow-500 bg-yellow-100">${m.combined}</td>
      `;
      tbody.appendChild(row);
    });

    // Last updated (you can change this manually)
    document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  </script>
</body>
</html>
